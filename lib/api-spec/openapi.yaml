openapi: 3.1.0
info:
  title: Api
  version: 0.1.0
  description: Cloud PHP Lab API
servers:
  - url: /api
    description: Base API path
tags:
  - name: health
    description: Health operations
  - name: auth
    description: Authentication operations
  - name: projects
    description: Project management
  - name: files
    description: File management
  - name: php
    description: PHP execution
  - name: database
    description: Database management
  - name: export
    description: Project export

paths:
  /healthz:
    get:
      operationId: healthCheck
      tags: [health]
      summary: Health check
      responses:
        "200":
          description: Healthy
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/HealthStatus"

  /auth/register:
    post:
      operationId: register
      tags: [auth]
      summary: Register a new user
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RegisterRequest"
      responses:
        "201":
          description: User registered
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "400":
          description: Bad request
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
        "409":
          description: Email already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/login:
    post:
      operationId: login
      tags: [auth]
      summary: Login
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/LoginRequest"
      responses:
        "200":
          description: Login successful
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/AuthResponse"
        "401":
          description: Invalid credentials
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /auth/logout:
    post:
      operationId: logout
      tags: [auth]
      summary: Logout
      responses:
        "200":
          description: Logged out
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /auth/me:
    get:
      operationId: getMe
      tags: [auth]
      summary: Get current user
      responses:
        "200":
          description: Current user
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/User"
        "401":
          description: Unauthorized
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects:
    get:
      operationId: listProjects
      tags: [projects]
      summary: List user projects
      responses:
        "200":
          description: List of projects
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/Project"
    post:
      operationId: createProject
      tags: [projects]
      summary: Create a new project
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateProjectRequest"
      responses:
        "201":
          description: Project created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "409":
          description: Project already exists
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}:
    get:
      operationId: getProject
      tags: [projects]
      summary: Get project details
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project details
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
        "404":
          description: Not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"
    patch:
      operationId: updateProject
      tags: [projects]
      summary: Rename project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/UpdateProjectRequest"
      responses:
        "200":
          description: Project updated
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/Project"
    delete:
      operationId: deleteProject
      tags: [projects]
      summary: Delete project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: Project deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/files:
    get:
      operationId: listFiles
      tags: [files]
      summary: List files in project
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: path
          in: query
          required: false
          schema:
            type: string
          description: Subdirectory path
      responses:
        "200":
          description: File tree
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/FileNode"

  /projects/{projectId}/files/read:
    get:
      operationId: readFile
      tags: [files]
      summary: Read file content
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: path
          in: query
          required: true
          schema:
            type: string
      responses:
        "200":
          description: File content
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/FileContent"
        "404":
          description: File not found
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/ErrorResponse"

  /projects/{projectId}/files/write:
    post:
      operationId: writeFile
      tags: [files]
      summary: Write file content
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/WriteFileRequest"
      responses:
        "200":
          description: File written
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/files/create-folder:
    post:
      operationId: createFolder
      tags: [files]
      summary: Create a folder
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateFolderRequest"
      responses:
        "200":
          description: Folder created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/files/rename:
    post:
      operationId: renameFile
      tags: [files]
      summary: Rename a file or folder
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RenameFileRequest"
      responses:
        "200":
          description: Renamed
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/files/delete:
    post:
      operationId: deleteFile
      tags: [files]
      summary: Delete a file or folder
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/DeleteFileRequest"
      responses:
        "200":
          description: Deleted
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/php/execute:
    post:
      operationId: executePhp
      tags: [php]
      summary: Execute a PHP file and return HTML output
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/ExecutePhpRequest"
      responses:
        "200":
          description: PHP output
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/PhpExecuteResponse"

  /projects/{projectId}/databases:
    get:
      operationId: listDatabases
      tags: [database]
      summary: List user databases
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: List of databases
          content:
            application/json:
              schema:
                type: array
                items:
                  $ref: "#/components/schemas/UserDatabase"
    post:
      operationId: createDatabase
      tags: [database]
      summary: Create a new database
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/CreateDatabaseRequest"
      responses:
        "201":
          description: Database created
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/UserDatabase"

  /projects/{projectId}/databases/{dbName}/query:
    post:
      operationId: runQuery
      tags: [database]
      summary: Run a SQL query on a user database
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: dbName
          in: path
          required: true
          schema:
            type: string
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/RunQueryRequest"
      responses:
        "200":
          description: Query result
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/QueryResult"

  /projects/{projectId}/databases/{dbName}/tables:
    get:
      operationId: listTables
      tags: [database]
      summary: List tables in a database
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: dbName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: List of tables
          content:
            application/json:
              schema:
                type: array
                items:
                  type: string

  /projects/{projectId}/databases/{dbName}:
    delete:
      operationId: dropDatabase
      tags: [database]
      summary: Drop a user database
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
        - name: dbName
          in: path
          required: true
          schema:
            type: string
      responses:
        "200":
          description: Database dropped
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/SuccessResponse"

  /projects/{projectId}/export:
    get:
      operationId: exportProject
      tags: [export]
      summary: Download project as ZIP with database dump
      parameters:
        - name: projectId
          in: path
          required: true
          schema:
            type: integer
      responses:
        "200":
          description: ZIP file
          content:
            application/zip:
              schema:
                type: string
                format: binary

components:
  schemas:
    HealthStatus:
      type: object
      properties:
        status:
          type: string
      required:
        - status

    ErrorResponse:
      type: object
      properties:
        error:
          type: string
      required:
        - error

    SuccessResponse:
      type: object
      properties:
        success:
          type: boolean
        message:
          type: string
      required:
        - success

    RegisterRequest:
      type: object
      properties:
        name:
          type: string
        email:
          type: string
          format: email
        password:
          type: string
          minLength: 6
      required:
        - name
        - email
        - password

    LoginRequest:
      type: object
      properties:
        email:
          type: string
          format: email
        password:
          type: string
      required:
        - email
        - password

    AuthResponse:
      type: object
      properties:
        token:
          type: string
        user:
          $ref: "#/components/schemas/User"
      required:
        - token
        - user

    User:
      type: object
      properties:
        id:
          type: integer
        name:
          type: string
        email:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - name
        - email
        - createdAt

    Project:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        projectName:
          type: string
        projectPath:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - projectName
        - projectPath
        - createdAt

    CreateProjectRequest:
      type: object
      properties:
        projectName:
          type: string
      required:
        - projectName

    UpdateProjectRequest:
      type: object
      properties:
        projectName:
          type: string
      required:
        - projectName

    FileNode:
      type: object
      properties:
        name:
          type: string
        path:
          type: string
        type:
          type: string
          enum: [file, directory]
        children:
          type: array
          items:
            $ref: "#/components/schemas/FileNode"
      required:
        - name
        - path
        - type

    FileContent:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content

    WriteFileRequest:
      type: object
      properties:
        path:
          type: string
        content:
          type: string
      required:
        - path
        - content

    CreateFolderRequest:
      type: object
      properties:
        path:
          type: string
      required:
        - path

    RenameFileRequest:
      type: object
      properties:
        oldPath:
          type: string
        newPath:
          type: string
      required:
        - oldPath
        - newPath

    DeleteFileRequest:
      type: object
      properties:
        path:
          type: string
      required:
        - path

    ExecutePhpRequest:
      type: object
      properties:
        filePath:
          type: string
      required:
        - filePath

    PhpExecuteResponse:
      type: object
      properties:
        output:
          type: string
        error:
          type: string
        exitCode:
          type: integer
      required:
        - output
        - exitCode

    UserDatabase:
      type: object
      properties:
        id:
          type: integer
        userId:
          type: integer
        dbName:
          type: string
        createdAt:
          type: string
          format: date-time
      required:
        - id
        - userId
        - dbName
        - createdAt

    CreateDatabaseRequest:
      type: object
      properties:
        dbName:
          type: string
      required:
        - dbName

    RunQueryRequest:
      type: object
      properties:
        sql:
          type: string
      required:
        - sql

    QueryResult:
      type: object
      properties:
        columns:
          type: array
          items:
            type: string
        rows:
          type: array
          items:
            type: object
            additionalProperties: true
        rowCount:
          type: integer
        error:
          type: string
      required:
        - columns
        - rows
        - rowCount
