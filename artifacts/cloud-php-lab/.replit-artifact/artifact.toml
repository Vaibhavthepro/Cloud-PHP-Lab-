kind = "web"
previewPath = "/"
title = "Cloud PHP Lab"
version = "1.0.0"
id = "artifacts/cloud-php-lab"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
localPort = 20330
name = "web"
paths = ["/"]

[services.development]
run = "pnpm --filter @workspace/cloud-php-lab run dev"

[services.env]
PORT = "20330"
BASE_PATH = "/"

[services.production]
build = ["pnpm", "--filter", "@workspace/cloud-php-lab", "run", "build"]
publicDir = "artifacts/cloud-php-lab/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"
